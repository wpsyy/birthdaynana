<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You 🤍</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  font-family: sans-serif;
}

/* TAP SCREEN */
#start {
  position: absolute;
  width: 100%;
  height: 100%;
  background: black;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 24px;
  cursor: pointer;
  z-index: 10;
}

/* VIDEO */
video {
  width: 100%;
  height: 100vh;
  object-fit: cover;
}

/* MESSAGE */
.message {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  
  width: 90%;
  max-width: 600px;

  text-align: center;
  color: white;

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;

  line-height: 1.6;
}

.message h1 {
  font-size: 32px;
  margin-bottom: 10px;
}

.message p {
  font-size: 16px;
  opacity: 0.9;
}

/* FADE */
.fade-out {
  opacity: 0;
  transition: opacity 1s ease;
}

/* ENDING */
#ending {
  position: absolute;
  width: 100%;
  height: 100%;
  background: black;
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  color: white;
}

#ending img {
  width: 200px;
  border-radius: 10px;
  margin-bottom: 20px;
}
</style>

</head>
<body>

<div id="start">tap to open 💌</div>

<!-- START -->
<div class="start">
  <button onclick="start()">tap to open message 💌</button>
</div>

<!-- VIDEO -->
<video id="bgVideo" loop muted>
  <video src="./file/video/awan.mp4"></video>
  <source src="awan.mp4" type="video/mp4">
</video>

<!-- SLIDES -->
<div id="slideshow">
  <img src="./file/foto/"></img>
  <img src="IMG_20240814_072725_829.webp">
  <img src="IMG_20241103_172316_369.webp">
  <img src="IMG_20240605_182736_894.webp">
  <img src="IMG_20260315_194850_917.webp">
  <img src="IMG_20250219_103359_260.webp">
  <img src="IMG_20250728_123219_430.webp">
</div>

<!-- TEXT -->
<div class="text">
  <h1 id="title"></h1>
  <p id="desc"></p>
</div>

<!-- ENDING -->
<div class="ending" id="ending">
  <img src="./file/foto/IMG_20250107_200842_518.webp"></img>

</div>

<!-- MUSIC -->
<audio id="music" loop>
  <audio src="./file/music/risal1.MP3"></audio>
  <source src="risal1.MP3">
</audio>

<script>
const start = document.getElementById("start");
const video = document.getElementById("video");
const music = document.getElementById("music");
const message = document.getElementById("messageBox");
const ending = document.getElementById("ending");

start.onclick = () => {
  start.style.display = "none";

  video.play();
  music.play();

  // fade text setelah 5 detik
  setTimeout(() => {
    message.classList.add("fade-out");
  }, 5000);

  // munculin ending setelah 12 detik
  setTimeout(() => {
    ending.style.display = "flex";
  }, 12000);
};
</script>

</body>
