<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>for you 🤍</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Poppins:wght@300&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  font-family: 'Poppins', sans-serif;
}

/* PARTICLES */
#flowers {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 3;
}

.particle {
  mix-blend-mode: screen;
}

.particle {
  position: absolute;
  border-radius: 50%;
  filter: blur(1px);
  animation: fallParticle linear forwards;
}

/* variasi warna */
.pink {
  background: #ffc0cb;
  box-shadow: 0 0 6px #ffc0cb;
}

.gold {
  background: #ffd700;
  box-shadow: 0 0 8px #ffd700;
}

.white {
  background: white;
  box-shadow: 0 0 5px white;
}

@keyframes fallParticle {
  0% {
    transform: translateY(-10vh) translateX(0) scale(0.5);
    opacity: 0;
  }
  20% { opacity: 0.7; }
  100% {
    transform: translateY(110vh) translateX(30px) scale(1.2);
    opacity: 0;
  }
}

/* START */
.start {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 10;
}

.start button {
  padding: 15px 25px;
  border-radius: 20px;
  border: none;
  background: white;
  cursor: pointer;
}

/* VIDEO */
video {
  position: fixed;
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: brightness(25%) blur(5px);
  opacity: 0;
  transition: 2s;
}

/* SLIDES */
#slideshow img {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0;
  transform: scale(1);
  transition: opacity 2s, transform 8s;
}

/* TEXT */
.text {
  position: absolute;
  bottom: 15%;
  width: 100%;
  text-align: center;
  color: white;
  z-index: 4;
}

h1 {
  font-family: 'Playfair Display', serif;
}

#desc {
  opacity: 0;
  transition: 1s;
}

/* GLITCH */
.glitch {
  animation: glitch 0.4s;
}

@keyframes glitch {
  20% { transform: translate(-5px,5px); }
  40% { transform: translate(5px,-5px); }
}

/* BLACK */
#black {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  opacity: 0;
  transition: 2s;
  z-index: 5;
}
</style>
</head>

<body>

<div id="flowers"></div>

<div class="start">
  <button onclick="start()">tap to open 💌</button>
</div>

<video id="bgVideo" loop muted playsinline>
  <source src="awan.mp4">
</video>

<div id="slideshow">
  <img src="IMG_20240814_072725_829.webp">
  <img src="IMG_20241103_172316_369.webp">
  <img src="IMG_20240605_182736_894.webp">
  <img src="IMG_20260315_194850_917.webp">
  <img src="IMG_20250219_103359_260.webp">
  <img src="IMG_20250728_123219_430.webp">
  <img src="IMG_20230721_175740_303.webp">
  <img src="IMG_20230806_141334_992.webp">
  <img src="IMG_20230825_174720_721.webp">
  <img src="IMG_20231018_140516_414.webp">
  <img src="IMG_20231024_004114_654.webp">
  <img src="IMG_20240526_133250_872.webp">
  <img src="IMG_20250219_103359_260.webp">
  <img src="IMG_20231220_091643_387.webp">  
  <img src="IMG_20240401_092411_467.webp">
  <img src="IMG_20240401_092527_217.webp"> 
  <img src="IMG_20240526_133250_872.webp">
  <img src="1.webp">
</div>

<div class="text">
  <h1 id="mainTitle">for my girlfriend 🤍</h1>
  <p id="desc"></p>
</div>

<div id="black"></div>

<audio id="music">
  <source src="risal1.mp3">
</audio>

<script>
let video = document.getElementById("bgVideo");
let music = document.getElementById("music");
let slides = document.querySelectorAll("#slideshow img");
let desc = document.getElementById("desc");
let black = document.getElementById("black");
let title = document.getElementById("mainTitle");

let index = 0;
let slideInterval;

let stories = [
"pertama kali kita ketemu...\naku ga nyangka bakal ada di titik bikin ini buat kamu🤍",
"lucu sih kalo di pikir pikir...\ndari mau coba profesional,sampe aku beneran suka sama kamu",
"kita mulai sering ngobrol...\ndan aku mulai nyaman",
"pelan-pelan...\nkamu jadi rumah buat aku",
"dan akhirnya...\naku sadar",
"kamu berhasil bener bikin aku jatuh cinta 🤍",
"makasih buat udah hadir di hidup aku...\njangan kemana mana dulu ya sampe aku kebandung",
"love u sayang🤍",
"HAPPY TWENTIES🤍..."
];
// PARTICLE
function spawnParticles() {
  const container = document.getElementById("flowers");

  for (let i = 0; i < 12; i++) {
    let p = document.createElement("div");
    p.classList.add("particle");

    // 🎨 RANDOM WARNA
    const colors = ["white", "pink", "gold"];
    p.classList.add(colors[Math.floor(Math.random() * colors.length)]);

    // 🔥 DEPTH EFFECT
    let size = Math.random() * 4 + 2; // 2px - 6px
    p.style.width = size + "px";
    p.style.height = size + "px";

    // yang kecil = jauh → lebih transparan
    p.style.opacity = size < 3 ? 0.3 : 0.7;

    // posisi
    p.style.left = Math.random() * 100 + "vw";
    p.style.top = "-10px";

    // speed beda (depth illusion)
    p.style.animationDuration = (5 + Math.random() * 5) + "s";

    container.appendChild(p);

    setTimeout(() => p.remove(), 9000);
  }
}

// START
function start() {
  document.querySelector(".start").style.display = "none";

  video.style.opacity = 1;
  video.play();
  music.play();

  loopSlides();

  setInterval(spawnParticles, 900);

  music.onended = endScene;
}

// SLIDES
function loopSlides() {
  showSlide();
  slideInterval = setInterval(showSlide, 5000);
}

function showSlide() {
  slides.forEach(s => s.style.opacity = 0);

  let current = slides[index % slides.length];
  current.style.opacity = 0.7;
  current.style.transform = "scale(1.1)";

  if (index < stories.length) {
    typeText(stories[index]);

    setTimeout(() => {
      desc.classList.add("glitch");
      setTimeout(() => {
        desc.classList.remove("glitch");
        spawnParticles();
      }, 300);
    }, 2000);
  }

  index++;
}

// TYPE
function typeText(text) {
  desc.innerHTML = "";
  desc.style.opacity = 1;

  let i = 0;
  function typing() {
    if (i < text.length) {
      desc.innerHTML += text[i];
      i++;
      setTimeout(typing, 40);
    }
  }
  typing();
}

// END
function endScene() {
  clearInterval(slideInterval);
  desc.style.opacity = 0;
  title.style.opacity = 0;

  setTimeout(() => {
    black.style.opacity = 1;
  }, 1500);
}
</script>

</body>
</html>
